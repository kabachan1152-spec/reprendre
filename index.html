<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コンセプト＆ナビゲーション</title>
    <style>
        /* --- 全体の基本設定 --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f9f9f9;
        }

        /* --- ① ナビゲーションバーのスタイル --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #333;
        }

        /* パソコン用メニューの並び */
        .nav-menu {
            display: flex;
            align-items: center;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 30px;
        }

        .nav-item a {
            text-decoration: none;
            color: #555;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-item a:hover {
            color: #b1893c; /* ホバー時のアクセントカラー */
        }

        /* 予約ボタンの装飾 */
        .btn-reserve {
            background-color: #333;
            color: #fff !important;
            padding: 10px 20px;
            border-radius: 4px;
            transition: background-color 0.3s !important;
        }

        .btn-reserve:hover {
            background-color: #b1893c !important;
        }

        /* ハンバーガーボタン（初期状態は非表示） */
        .hamburger {
            display: none;
            cursor: pointer;
            flex-direction: column;
            gap: 6px;
            background: none;
            border: none;
            z-index: 110;
        }

        .hamburger .bar {
            width: 25px;
            height: 2px;
            background-color: #333;
            transition: all 0.3s ease;
        }

        /* --- ② スマホ用のレスポンシブデザイン（幅768px以下） --- */
        @media (max-width: 768px) {
            .hamburger {
                display: flex; /* スマホの時だけボタンを表示 */
            }

            /* メニューを画面外（右上）に隠す */
            .nav-menu {
                position: fixed;
                top: 0;
                right: -100%; /* 通常時は画面の外側 */
                flex-direction: column;
                background-color: rgba(255, 255, 255, 0.98);
                width: 70%;
                height: 100vh;
                padding-top: 100px;
                gap: 40px;
                box-shadow: -5px 0 15px rgba(0,0,0,0.1);
                transition: right 0.4s ease; /* スライドのアニメーション */
            }

            /* JavaScriptで「.active」クラスがついたら画面内にスライドイン */
            .nav-menu.active {
                right: 0;
            }

            /* ハンバーガーボタンのアニメーション（三本線が「X」になる） */
            .hamburger.active .bar:nth-child(1) {
                transform: translateY(8px) rotate(45deg);
            }
            .hamburger.active .bar:nth-child(2) {
                opacity: 0;
            }
            .hamburger.active .bar:nth-child(3) {
                transform: translateY(-8px) rotate(-45deg);
            }
        }

        /* --- ③ 1回目の区切り線のスタイル --- */
        .divider {
            display: flex;
            align-items: center;
            margin: 60px 0 40px 0;
        }
        .divider-line {
            flex-grow: 1;
            height: 1px;
            background-color: #ddd;
        }
        .divider-text {
            padding: 0 20px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #333;
        }

        /* --- ④ 2回目のコンセプトエリアのスタイル --- */
        .concept-section {
            position: relative;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .concept-bg {
            position: absolute;
            inset: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
        }

        .concept-content {
            position: relative;
            background-color: rgba(255, 255, 255, 0.85);
            padding: 40px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">RESTAURANT</div>
        
        <button class="hamburger" id="js-hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>

        <ul class="nav-menu" id="js-nav-menu">
            <li class="nav-item"><a href="#concept">CONCEPT</a></li>
            <li class="nav-item"><a href="#wine">WINE</a></li>
            <li class="nav-item"><a href="#access">ACCESS</a></li>
            <li class="nav-item"><a href="#reserve" class="btn-reserve">ご予約</a></li>
        </ul>
    </nav>

    <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">CONCEPT</div>
        <div class="divider-line"></div>
    </div>

    <script>
        const hamburger = document.getElementById('js-hamburger');
        const navMenu = document.getElementById('js-nav-menu');

        // ハンバーガーボタンをクリックしたときの動き
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        });

        // メニューのリンクをクリックしたらメニューを閉じる
        document.querySelectorAll('.nav-item a').forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            });
        });
    </script>
