<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>居酒屋 るぷらんどる</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Zen+Old+Mincho:wght@400;700&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --wa-black: #1c1108;
    --wa-brown: #5c3d1e;
    --wa-tan: #c4935a;
    --wa-cream: #f5ede0;
    --wa-paper: #faf6ef;
    --wa-accent: #a0522d;
    --wa-muted: #8a7060;
    --wa-border: rgba(92,61,30,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: var(--wa-paper);
    color: var(--wa-black);
    font-family: 'Noto Serif JP', serif;
    line-height: 1.8;
  }

  /* ==========================================
     NAV NAVIGATION (PC & ベーススタイル)
     ========================================== */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 3rem;
    background: rgba(250,246,239,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--wa-border);
  }

  .nav-logo {
    font-family: 'Zen Old Mincho', serif;
    font-size: 1.5rem;
    color: var(--wa-brown);
    letter-spacing: 0.2em;
    text-decoration: none;
  }
  .nav-logo span { color: var(--wa-tan); }

  /* PC用メニューリンク */
  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
    align-items: center;
  }

  .nav-links a {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--wa-muted);
    text-decoration: none;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: var(--wa-brown); }

  /* ハンバーガーメニュー内専用の予約項目（PCでは非表示） */
  .nav-links .sp-reserve-item {
    display: none;
  }

  /* PC用ヘッダー内 予約ボタン */
  .nav-reserve {
    display: block;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    padding: 0.5rem 1.4rem;
    border: 1px solid var(--wa-tan);
    color: var(--wa-brown);
    background: transparent;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.3s;
  }
  .nav-reserve:hover {
    background: var(--wa-tan);
    color: white;
  }

  /* トグル用チェックボックス（常に非表示） */
  #nav-toggle {
    display: none;
  }

  /* ハンバーガーアイコン（PCでは非表示） */
  .nav-toggle-label {
    display: none;
    cursor: pointer;
    padding: 0.5rem;
    z-index: 110;
  }

  /* ==========================================
     RESPONSIVE (スマートフォン用スタイル: 768px以下)
     ========================================== */
  @media (max-width: 768px) {
    nav {
      padding: 1rem 1.5rem;
    }

    /* PC用の独立した予約ボタンを非表示に */
    .nav-reserve {
      display: none;
    }

    /* ハンバーガー三本線アイコンの表示 */
    .nav-toggle-label {
      display: block;
      position: relative;
      width: 30px;
      height: 20px;
    }

    .nav-toggle-label span,
    .nav-toggle-label span:before,
    .nav-toggle-label span:after {
      content: '';
      position: absolute;
      width: 100%;
      height: 1.5px;
      background: var(--wa-brown);
      transition: all 0.3s ease-in-out;
    }

    .nav-toggle-label span { top: 9px; }
    .nav-toggle-label span:before { top: -9px; }
    .nav-toggle-label span:after { top: 9px; }

    /* スマホ用ドロワーメニューの展開 */
    .nav-links {
      position: fixed;
      top: 0;
      left: 100%; /* 初期状態は画面外右側 */
      width: 100%;
      height: 100vh;
      background: rgba(250, 246, 239, 0.98);
      flex-direction: column;
      justify-content: center;
      gap: 2.5rem;
      transition: left 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 105;
    }

    .nav-links a {
      font-size: 1.1rem;
      letter-spacing: 0.2em;
    }

    /* ハンバーガーメニュー内でのみ予約項目を表示 */
    .nav-links .sp-reserve-item {
      display: block;
      margin-top: 1rem;
    }

    /* メニュー内予約ボタンの上品な和モダン装飾 */
    .nav-links .sp-reserve-button {
      border: 1px solid var(--wa-tan);
      padding: 0.7rem 2.5rem;
      color: var(--wa-brown);
      background: transparent;
      font-weight: 400;
    }

    /* チェックボックスが入った（開いた）時のアニメーション */
    #nav-toggle:checked ~ .nav-links {
      left: 0; /* 画面内に滑り込む */
    }

    /* 三本線から✕印への変形 */
    #nav-toggle:checked ~ .nav-toggle-label span {
      background: transparent;
    }
    #nav-toggle:checked ~ .nav-toggle-label span:before {
      transform: rotate(45deg);
      top: 0;
    }
    #nav-toggle:checked ~ .nav-toggle-label span:after {
      transform: rotate(-45deg);
      top: 0;
    }
  }

  /* 表示確認用の暫定コンテンツエリア */
  .content-mock {
    padding: 5rem 2rem;
    text-align: center;
    min-height: 80vh;
  }
</style>
</head>
<body>

<header>
  <nav>
    <a href="#" class="nav-logo">るぷらんどる<span>.</span></a>

    <input type="checkbox" id="nav-toggle">

    <label for="nav-toggle" class="nav-toggle-label">
      <span></span>
    </label>

    <ul class="nav-links">
      <li><a href="#concept">コンセプト</a></li>
      <li><a href="#menu">お品書き</a></li>
      <li><a href="#access">アクセス</a></li>
      <li class="sp-reserve-item">
        <a href="#reservation" class="sp-reserve-button">ご予約はこちら</a>
      </li>
    </ul>

    <a href="#reservation" class="nav-reserve">ご予約</a>
  </nav>
</header>

<main>
  <div class="content-mock">
    <h1 style="font-family: 'Zen Old Mincho', serif; font-size: 2.5rem; color: var(--wa-brown);">和モダンな空間で味わう</h1>
    <p style="color: var(--wa-muted); margin-top: 1rem;">画面の横幅を縮めると、PC用メニューと予約ボタンが消え、ハンバーガーメニューの中に「ご予約はこちら」が統合されます。</p>
  </div>
</main>

</body>
</html>
